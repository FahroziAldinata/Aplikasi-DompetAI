name: dompetai
description: AI Personal Finance Assistant for Indonesia
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.0
  tflite_flutter: ^0.12.1
  path_provider: ^2.1.3
  path: ^1.9.0
  intl: ^0.19.0
  fl_chart: ^0.68.0
  cupertino_icons: ^1.0.6
  pdf: ^3.10.8
  share_plus: ^7.2.1
  flutter_local_notifications: ^17.2.1
  shared_preferences: ^2.3.0
  flutter_native_splash: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#131316"
  adaptive_icon_foreground: "assets/icon/app_icon_fg.png"

flutter_native_splash:
  color: "#131316"
  image: assets/icon/app_icon.png
  android_12:
    color: "#131316"
    image: assets/icon/app_icon.png
